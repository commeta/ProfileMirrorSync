name: build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Restore source
        run: dotnet restore src/ProfileMirrorSync.csproj

      - name: Restore tests
        run: dotnet restore tests/ProfileMirrorSync.Tests.csproj

      - name: Build (Release)
        run: dotnet build src/ProfileMirrorSync.csproj -c Release --no-restore

      - name: Test
        run: dotnet test tests/ProfileMirrorSync.Tests.csproj -c Release --no-restore

      - name: Publish
        run: dotnet publish src/ProfileMirrorSync.csproj -c Release -r win-x64 --self-contained false -o publish

      - name: Prepare release folder
        if: github.event_name == 'push'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item -Path publish\* -Destination release\ -Recurse -Force
          Copy-Item -Path install.bat -Destination release\ -Force
          if (Test-Path uninstall.bat) { Copy-Item -Path uninstall.bat -Destination release\ -Force }
          if (Test-Path README.md) { Copy-Item -Path README.md -Destination release\ -Force }
          if (Test-Path LICENSE) { Copy-Item -Path LICENSE -Destination release\ -Force }

      - name: Create release zip
        if: github.event_name == 'push'
        shell: pwsh
        run: |
          Compress-Archive -Path release\* -DestinationPath ProfileMirrorSync-win-x64.zip -Force

      - name: Upload release zip
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v6
        with:
          name: ProfileMirrorSync-win-x64
          path: ProfileMirrorSync-win-x64.zip
