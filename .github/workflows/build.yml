name: build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore src/ProfileMirrorSync.csproj

      - name: Build (Release)
        run: dotnet build src/ProfileMirrorSync.csproj -c Release --no-restore

      - name: Test
        run: dotnet test tests/ProfileMirrorSync.Tests.csproj -c Release
